{{define "title"}}Search — Insighta Labs+{{end}} {{define "content"}}
<div class="page-header">
    <h1>Natural Language Search</h1>
    <p class="text-muted">
        Try: "male adults from Nigeria", "female seniors", "young people from
        US"
    </p>
</div>

<form
    class="search-form"
    hx-get="{{.BasePath}}/search"
    hx-target="#search-results"
    hx-push-url="true"
    hx-trigger="submit"
>
    <div class="search-input-group">
        <input
            type="text"
            name="q"
            value="{{.Query}}"
            placeholder="Describe the profiles you're looking for…"
            class="search-input"
            autofocus
        />
        <button type="submit" class="btn btn-primary">Search</button>
    </div>
</form>

<div id="search-results">{{template "search_results_content" .}}</div>
{{end}}
