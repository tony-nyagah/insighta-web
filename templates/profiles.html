{{define "title"}}Profiles — Insighta Labs+{{end}}
{{define "content"}}
<div class="page-header">
  <h1>Profiles</h1>
  <div class="page-header-actions">
    <a href="/profiles/export?format=csv{{if .Filters.gender}}&gender={{.Filters.gender}}{{end}}{{if .Filters.country_id}}&country_id={{.Filters.country_id}}{{end}}" class="btn btn-secondary">Export CSV</a>
    {{if eq .User.Role "admin"}}<a href="/profiles/new" class="btn btn-primary">+ New Profile</a>{{end}}
  </div>
</div>

<!-- Filters — HTMX pushes updated table without full page reload -->
<form class="filter-bar"
      hx-get="/profiles"
      hx-target="#profiles-container"
      hx-push-url="true"
      hx-trigger="change, submit">
  <input type="hidden" name="page" value="1">
  <select name="gender">
    <option value="">All genders</option>
    <option value="male" {{if eq (.Filters.Get "gender") "male"}}selected{{end}}>Male</option>
    <option value="female" {{if eq (.Filters.Get "female") "female"}}selected{{end}}>Female</option>
  </select>
  <select name="age_group">
    <option value="">All age groups</option>
    <option value="child">Child</option>
    <option value="teenager">Teenager</option>
    <option value="adult">Adult</option>
    <option value="senior">Senior</option>
  </select>
  <input type="text" name="country_id" placeholder="Country code (e.g. NG)" value="{{.Filters.Get "country_id"}}" maxlength="2">
  <select name="sort_by">
    <option value="created_at">Sort: Date</option>
    <option value="age">Sort: Age</option>
    <option value="gender_probability">Sort: Gender conf.</option>
  </select>
  <select name="order">
    <option value="desc">Desc</option>
    <option value="asc">Asc</option>
  </select>
  <button type="submit" class="btn btn-primary">Filter</button>
</form>

<div id="profiles-container">
  {{template "profiles_table_content" .}}
</div>
{{end}}
